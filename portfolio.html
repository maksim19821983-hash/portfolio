<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моё портфолио</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 40px;
            color: #333;
        }
        
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
        }
        
        .portfolio-item {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        
        .portfolio-item:hover {
            transform: translateY(-5px);
        }
        
        .portfolio-preview {
            width: 100%;
            height: 250px;
            background: #ddd;
            object-fit: cover;
        }
        
        .portfolio-info {
            padding: 20px;
        }
        
        .portfolio-info h3 {
            margin-bottom: 10px;
            color: #333;
        }
        
        .portfolio-info p {
            color: #666;
            margin-bottom: 15px;
            line-height: 1.5;
        }
        
        .tech-stack {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        
        .tech-tag {
            background: #8B5CF6;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        
        .portfolio-links {
            display: flex;
            gap: 10px;
        }
        
        .btn {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 500;
            transition: background 0.3s;
        }
        
        .btn-primary {
            background: #8B5CF6;
            color: white;
            flex: 1;
            text-align: center;
        }
        
        .btn-primary:hover {
            background: #7C3AED;
        }
        
        .btn-secondary {
            background: #f3f4f6;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e5e7eb;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 Моё портфолио вёрстки</h1>
        
        <div class="portfolio-grid">
            <!-- Проект 1 -->
            <div class="portfolio-item">
                <div class="portfolio-info">
                    <h3>Лендинг доставки</h3>
                    <p>Адаптивная вёрстка лендинга с калькулятором доставки</p>
                    <div class="tech-stack">
                        <span class="tech-tag">HTML5</span>
                        <span class="tech-tag">CSS3</span>
                        <span class="tech-tag">Flexbox</span>
                        <span class="tech-tag">Адаптив</span>
                    </div>
                    <div class="portfolio-links">
                        <a href="/nike/index.html" class="btn btn-primary" target="_blank">Посмотреть</a>
                        <a href="https://github.com/ваш-ник/репозиторий" class="btn btn-secondary" target="_blank">Код</a>
                    </div>
                </div>
            </div>
            
            <!-- Проект 2 -->
            <div class="portfolio-item">
                <div class="portfolio-info">
                    <h3>Корпоративный сайт</h3>
                    <p>Многостраничный сайт с формой обратной связи</p>
                    <div class="tech-stack">
                        <span class="tech-tag">HTML5</span>
                        <span class="tech-tag">CSS3</span>
                        <span class="tech-tag">JavaScript</span>
                    </div>
                    <div class="portfolio-links">
                        <a href="/shop.co/index.html" class="btn btn-primary" target="_blank">Посмотреть</a>
                        <a href="https://github.com/ваш-ник/репозиторий" class="btn btn-secondary" target="_blank">Код</a>
                    </div>
                </div>
            </div>
            
            <!-- Добавьте ещё проекты по аналогии -->
        </div>
    </div>
</body>
</html>
